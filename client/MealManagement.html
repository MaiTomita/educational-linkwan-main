<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Food Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="menu-icon"><span></span><span></span><span></span></div>
            <div class="top-date-info">
                2/15(土) ☁️ 曇り 11℃
            </div>
            <div class="launch-btn">起動画面へ</div>
        </header>

        <div class="profile-section">
            <div class="profile-card">
                <img src="https://via.placeholder.com/40" alt="Pet" class="pet-thumb">
                <span class="pet-name">海</span>
                <span class="arrow-right">></span>
            </div>
            <div class="med-btn">服薬管理</div>
        </div>

        <div class="summary-card">
            <h3>🐾 今日の記録 🐾</h3>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 85%;">
                    <span class="flag-icon">🚩</span>
                </div>
            </div>
            <div class="calorie-stats">
                <div class="stat-item">
                    <p class="label">摂取カロリー</p>
                    <p class="value intake">738 <small>Kcal</small></p>
                </div>
                <div class="stat-item">
                    <p class="label">目標</p>
                    <p class="value target">688 <small>Kcal</small></p>
                </div>
            </div>
        </div>

        <div class="meal-list">
            <div class="meal-item">
                <div class="meal-header">
                    <span class="meal-icon">🌅</span> 朝ごはん
                    <span class="meal-cal">36Kcal 📝</span>
                </div>
                <div class="meal-details">
                    <div class="row"><span>ゆでささみ</span><span>40 g</span></div>
                </div>
            </div>

            <div class="meal-item">
                <div class="meal-header">
                    <span class="meal-icon">☀️</span> 昼ごはん
                    <span class="meal-cal">000Kcal 📝</span>
                </div>
            </div>

            <div class="meal-item">
                <div class="meal-header">
                    <span class="meal-icon">🌙</span> 夜ごはん
                    <span class="meal-cal">440Kcal 📝</span>
                </div>
                <div class="meal-details">
                    <div class="row"><span>ゆでささみ</span><span>50 g</span></div>
                    <div class="row"><span>ベストバランス 柴犬用</span><span>100 g</span></div>
                    <div class="row"><span>いなば 総合栄養食ツインズ</span><span>40 g</span></div>
                </div>
            </div>

            <div class="meal-item">
                <div class="meal-header">
                    <span class="meal-icon">❤️</span> おやつ
                    <span class="meal-cal">262Kcal 📝</span>
                </div>
                <div class="meal-details">
                    <div class="row"><span>グランデリ おっとっと 犬用</span><span>20 g</span></div>
                    <div class="row"><span>ベストバランス 柴犬用</span><span>50 g</span></div>
                </div>
            </div>
        </div>

        <nav class="footer-nav">
            <div class="nav-item">🏠</div>
            <div class="nav-item">🔒</div>
            <div class="nav-item">🦴</div>
            <div class="nav-item">🗓️</div>
        </nav>
    </div>
</body>
</html>
