<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Calendar UI</title>
    <style>
        :root {
            --bg-color: #f7eee2;
            --header-bg: #e2c09c;
            --text-color: #5d4037;
            --saturday-bg: #dcedff;
            --sunday-bg: #fde0e9;
            --card-bg: #ffffff;
            --list-item-bg: #efe1d1;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-color);
        }

        /* 上部ヘッダー */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .menu-icon {
            width: 40px;
            height: 40px;
            background: #d9c7b5;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        .menu-icon div { width: 24px; height: 3px; background: white; }

        .date-weather {
            background: white;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* カレンダー本体 */
        .calendar-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .month-header {
            background-color: var(--header-bg);
            text-align: center;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }

        .day-label {
            padding: 10px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
        }

        .day {
            height: 60px;
            padding-top: 10px;
            font-size: 1rem;
            position: relative;
        }

        .sat { background-color: var(--saturday-bg); }
        .sun { background-color: var(--sunday-bg); }
        .inactive { color: #ccc; }

        /* アイコンのダミー */
        .pet-icon {
            width: 20px;
            height: 20px;
            background: #8d6e63;
            border-radius: 50%;
            margin: 2px auto;
            border: 1px solid white;
        }

        /* 下部予定リスト */
        .schedule-list {
            background-color: var(--list-item-bg);
            border-radius: 20px;
            padding: 15px;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .schedule-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #d9c7b5;
        }

        .item-date { width: 50px; font-weight: bold; }
        .item-content { flex-grow: 1; font-size: 0.9rem; }

        /* ナビゲーションバー */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            margin-top: 10px;
        }
        .nav-item { font-size: 24px; color: #d9c7b5; }
        .nav-item.active { color: #8d6e63; }

    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="menu-icon"><div></div><div></div><div></div></div>
        <div class="date-weather">2/15(土) ☁️ 11℃</div>
        <div style="width:40px"></div> </div>

    <div class="calendar-card">
        <div class="month-header">2月</div>
        <div class="calendar-grid">
            <div class="day-label">月</div><div class="day-label">火</div><div class="day-label">水</div>
            <div class="day-label">木</div><div class="day-label">金</div><div class="day-label sat">土</div><div class="day-label sun">日</div>
            
            <div class="day inactive">27</div><div class="day inactive">28</div><div class="day inactive">29</div>
            <div class="day inactive">30</div><div class="day inactive">31</div><div class="day sat">1</div><div class="day sun">2</div>
            
            <div class="day">3</div>
            <div class="day">4<div class="pet-icon"></div></div>
            <div class="day">5</div><div class="day">6</div><div class="day">7</div>
            <div class="day sat">8</div><div class="day sun">9</div>

            <div class="day">10</div><div class="day">11</div><div class="day">12</div><div class="day">13</div><div class="day">14</div>
            <div class="day sat">15<div style="display:flex; justify-content:center"><div class="pet-icon"></div><div class="pet-icon"></div></div></div>
            <div class="day sun">16</div>

            <div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div>
            <div class="day sat">22</div><div class="day sun">23</div>
            
            <div class="day">24</div>
            <div class="day">25<div class="pet-icon"></div></div>
            <div class="day">26</div><div class="day">27</div><div class="day">28</div>
            <div class="day sat inactive">1</div><div class="day sun inactive">2</div>
        </div>
    </div>

    <div class="schedule-list">
        <div class="list-title">🐾 今月の予定 🐾</div>
        <div class="schedule-item">
            <div class="item-date">毎日</div>
            <div class="item-content">アポキル錠 1錠</div>
            <div class="pet-icon"></div>
        </div>
        <div class="schedule-item">
            <div class="item-date">4日</div>
            <div class="item-content">通院</div>
            <div class="pet-icon"></div>
        </div>
        <div class="schedule-item">
            <div class="item-date">15日</div>
            <div class="item-content">トリミング / 飲み会</div>
            <div style="display:flex; flex-direction:column">
                <div class="pet-icon"></div>
                <div class="pet-icon"></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item">🏠</div>
        <div class="nav-item">📋</div>
        <div class="nav-item">🦴</div>
        <div class="nav-item active">📅</div>
    </div>
</div>

</body>
</html>
